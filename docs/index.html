<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#14130f">
<title>Datum Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14130f; --panel:#1c1b16; --line:#322f27; --line2:#403c31;
    --fg:#ece7da; --muted:#9a9484; --green:#0f6e56; --green-bright:#3fa686;
    --serif:'Fraunces',Georgia,serif; --mono:'JetBrains Mono',ui-monospace,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--fg);display:flex;flex-direction:column;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
  header{flex:none;height:54px;display:flex;align-items:center;gap:16px;padding:0 16px;
    border-bottom:1px solid var(--line);background:var(--panel);
    padding-top:env(safe-area-inset-top);height:calc(54px + env(safe-area-inset-top))}
  .brand{font-family:var(--serif);font-weight:700;font-size:1.25rem;letter-spacing:-0.02em}
  .brand span{color:var(--green-bright)}
  .seg{margin-left:auto;display:flex;background:var(--bg);border:1px solid var(--line2);border-radius:10px;padding:3px}
  .seg button{font-family:var(--mono);font-size:0.72rem;letter-spacing:0.06em;text-transform:uppercase;
    color:var(--muted);background:none;border:none;padding:7px 16px;border-radius:7px;cursor:pointer;transition:.15s}
  .seg button.active{background:var(--green);color:#fff}
  main{flex:1;position:relative}
  iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:var(--bg)}
  .hide{display:none}
</style>
</head>
<body>
  <header>
    <div class="brand">Datum<span>.</span></div>
    <nav class="seg" id="seg">
      <button data-v="plan" class="active">Plan</button>
      <button data-v="analysis">Analysis</button>
    </nav>
  </header>
  <main>
    <iframe id="plan" src="plan.html" title="Training plan"></iframe>
    <iframe id="analysis" src="dashboard.html" title="Health analysis" class="hide" loading="lazy"></iframe>
  </main>
<script>
  const views = { plan: document.getElementById("plan"), analysis: document.getElementById("analysis") };
  const btns = document.querySelectorAll("#seg button");
  function show(v){
    btns.forEach(b => b.classList.toggle("active", b.dataset.v === v));
    for (const k in views) views[k].classList.toggle("hide", k !== v);
    history.replaceState(null, "", "#" + v);
  }
  btns.forEach(b => b.addEventListener("click", () => show(b.dataset.v)));
  show((location.hash || "#plan").slice(1) in views ? location.hash.slice(1) : "plan");
</script>
</body>
</html>
