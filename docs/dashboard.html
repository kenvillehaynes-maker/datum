<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datum Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14130f; --panel:#1c1b16; --panel2:#222019; --line:#322f27; --line2:#403c31;
    --fg:#ece7da; --muted:#9a9484; --faint:#6f695b;
    --green:#0f6e56; --green-bright:#3fa686; --amber:#ba7517; --red:#a32d2d; --blue:#185fa5;
    --serif:'Fraunces',Georgia,serif; --mono:'JetBrains Mono',ui-monospace,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--fg);font-family:var(--sans);line-height:1.5;
    -webkit-font-smoothing:antialiased;
    background-image:radial-gradient(circle at 12% -5%,rgba(63,166,134,0.08),transparent 38%),
                     radial-gradient(circle at 95% 0%,rgba(24,95,165,0.06),transparent 35%);}
  .wrap{max-width:1080px;margin:0 auto;padding:30px 22px 90px}
  .kicker{font-family:var(--mono);font-size:0.64rem;letter-spacing:0.26em;text-transform:uppercase;color:var(--green-bright)}
  h1{font-family:var(--serif);font-weight:700;font-size:2.3rem;letter-spacing:-0.02em;line-height:1.05;margin:4px 0}
  h1 .sub{color:var(--faint);font-weight:500}
  .meta{color:var(--muted);font-size:0.84rem;font-family:var(--mono);margin-top:6px}
  h2{font-family:var(--serif);font-weight:600;font-size:1.2rem;margin:34px 0 12px;letter-spacing:-0.01em}

  /* drop zone */
  .drop{margin-top:26px;border:1.5px dashed var(--line2);border-radius:16px;padding:46px 24px;text-align:center;
    cursor:pointer;transition:.15s;background:var(--panel)}
  .drop:hover,.drop.over{border-color:var(--green-bright);background:rgba(63,166,134,0.05)}
  .drop strong{font-family:var(--serif);font-size:1.15rem}
  .drop span{display:block;color:var(--muted);font-size:0.85rem;margin-top:8px}
  .drop code{font-family:var(--mono);color:var(--green-bright)}
  input[type=file]{display:none}
  .err{color:var(--red);font-family:var(--mono);font-size:0.82rem;margin-top:12px;min-height:1em;text-align:center}

  /* stat grid */
  .grid{display:grid;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .grid.s6{grid-template-columns:repeat(6,1fr)}
  .grid.s4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:760px){.grid.s6{grid-template-columns:repeat(3,1fr)}.grid.s4{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:440px){.grid.s6,.grid.s4{grid-template-columns:repeat(2,1fr)}}
  .stat{background:var(--panel);padding:16px 18px}
  .stat .l{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted)}
  .stat .v{font-family:var(--serif);font-size:1.7rem;font-weight:600;margin-top:5px;line-height:1}
  .stat .v small{font-size:0.78rem;color:var(--muted);font-family:var(--mono);font-weight:400}
  .stat .d{font-family:var(--mono);font-size:0.66rem;margin-top:4px}
  .up{color:var(--green-bright)} .down{color:var(--amber)}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px 22px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:760px){.two{grid-template-columns:1fr}}
  svg.chart{width:100%;display:block;overflow:visible}
  .chart-cap{font-family:var(--mono);font-size:0.66rem;color:var(--muted);margin-bottom:10px;letter-spacing:.04em}

  /* category bars */
  .cat{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line)}
  .cat:last-child{border-bottom:none}
  .cat .name{width:92px;font-family:var(--mono);font-size:0.74rem;text-transform:capitalize}
  .cat .bar{flex:1;height:9px;background:var(--panel2);border-radius:6px;overflow:hidden}
  .cat .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--green-bright));border-radius:6px}
  .cat .fig{font-family:var(--mono);font-size:0.72rem;color:var(--muted);width:150px;text-align:right}

  table{width:100%;border-collapse:collapse;font-size:0.82rem}
  th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line)}
  th{font-family:var(--mono);font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}
  td.n,th.n{text-align:right;font-family:var(--mono)}
  .tag{font-family:var(--mono);font-size:0.6rem;padding:2px 7px;border-radius:20px;border:1px solid var(--line2);text-transform:capitalize}
  .hide{display:none}
  .foot{margin-top:40px;color:var(--faint);font-size:0.78rem;border-top:1px solid var(--line);padding-top:16px;font-family:var(--mono)}
</style>
</head>
<body>
<div class="wrap">
  <div class="kicker">Datum Training</div>
  <h1>Training <span class="sub">analysis</span></h1>
  <div class="meta" id="meta">Load your export to begin</div>

  <label class="drop" id="drop">
    <strong>Drop your datum_health.json here</strong>
    <span>or click to choose it. Generate it first with <code>python datum_health.py</code>. Nothing leaves your browser.</span>
    <input type="file" id="file" accept=".json,application/json">
  </label>
  <div class="err" id="err"></div>

  <div id="dash" class="hide">
    <div class="grid s6" id="headline"></div>

    <h2>Pace trend</h2>
    <div class="panel">
      <div class="chart-cap">Clean runs, oldest to newest. Higher is faster.</div>
      <svg class="chart" id="paceChart" viewBox="0 0 720 220" preserveAspectRatio="none"></svg>
    </div>

    <div class="two" style="margin-top:18px">
      <div class="panel">
        <div class="chart-cap">Weekly run volume (km)</div>
        <svg class="chart" id="volChart" viewBox="0 0 360 200" preserveAspectRatio="none"></svg>
      </div>
      <div class="panel">
        <div class="chart-cap">Sessions by category</div>
        <div id="cats"></div>
      </div>
    </div>

    <h2>Athlete trends</h2>
    <div class="grid s4" id="athlete"></div>

    <h2>Recent sessions</h2>
    <div class="panel" style="padding:6px 18px">
      <table id="sessions"><thead><tr>
        <th>Date</th><th>Type</th><th class="n">Dist</th><th class="n">Time</th>
        <th class="n">Pace</th><th class="n">HR</th><th class="n">kcal</th><th>Source</th>
      </tr></thead><tbody></tbody></table>
    </div>
  </div>

  <div class="foot" id="foot"></div>
</div>

<script>
// ---------- helpers ----------
const $ = s => document.querySelector(s);
const fmtPace = s => { if(s==null) return "-"; let m=Math.floor(s/60),x=Math.round(s%60); if(x===60){m++;x=0;} return m+":"+String(x).padStart(2,"0"); };
const fmtDur = s => { s=Math.round(s||0); let h=Math.floor(s/3600),m=Math.floor(s%3600/60),x=s%60; return h?`${h}:${String(m).padStart(2,"0")}:${String(x).padStart(2,"0")}`:`${m}:${String(x).padStart(2,"0")}`; };
const isoWeek = d => { const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())); const day=(t.getUTCDay()+6)%7; t.setUTCDate(t.getUTCDate()-day+3); const f=new Date(Date.UTC(t.getUTCFullYear(),0,4)); return t.getUTCFullYear()+"-W"+String(1+Math.round(((t-f)/86400000-3+((f.getUTCDay()+6)%7))/7)).padStart(2,"0"); };
const median = a => { if(!a.length) return null; const s=[...a].sort((x,y)=>x-y),m=s.length>>1; return s.length%2?s[m]:(s[m-1]+s[m])/2; };

// ---------- load ----------
const drop=$("#drop"), fileIn=$("#file");
["dragover","dragenter"].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.add("over");}));
["dragleave","drop"].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.remove("over");}));
drop.addEventListener("drop",ev=>{ if(ev.dataTransfer.files[0]) read(ev.dataTransfer.files[0]); });
fileIn.addEventListener("change",()=>{ if(fileIn.files[0]) read(fileIn.files[0]); });

// auto-load if a datum_health.json sits next to the page (e.g. on your host)
fetch("datum_health.json").then(r=>r.ok?r.json():null).then(d=>{ if(d) render(d); }).catch(()=>{});

async function read(file){
  $("#err").textContent="";
  try{ render(JSON.parse(await file.text())); }
  catch(e){ $("#err").textContent="Could not read that file: "+e.message; }
}

// ---------- render ----------
function render(data){
  const w=(data.workouts||[]);
  if(!w.length){ $("#err").textContent="No workouts in that file."; return; }
  drop.classList.add("hide"); $("#dash").classList.remove("hide");

  const runs=w.filter(x=>x.modality==="run");
  const rides=w.filter(x=>x.modality==="bike");
  const clean=runs.filter(x=>x.valid_for_pace);
  const cdist=clean.reduce((s,x)=>s+x.distance_m,0), ctime=clean.reduce((s,x)=>s+x.duration_s,0);
  const avgPace=cdist?ctime/(cdist/1000):null;
  const best=clean.reduce((m,x)=> x.pace_s_per_km&&(m==null||x.pace_s_per_km<m)?x.pace_s_per_km:m, null);
  const dates=w.map(x=>x.date).sort();
  const m=data.meta||{};
  $("#meta").textContent=`${dates[0]} to ${dates[dates.length-1]}  ·  ${w.length} sessions`+
    (m.source_filter&&m.source_filter.length?`  ·  ${m.source_filter.join(", ")}`:"");

  // headline
  $("#headline").innerHTML=[
    card("Sessions",w.length),
    card("Runs",runs.length),
    card("Rides",rides.length),
    card("Run volume",(cdist/1000).toFixed(0),"km"),
    card("Avg pace",fmtPace(avgPace),"/km"),
    card("Best pace",fmtPace(best),"/km"),
  ].join("");

  paceChart(clean);
  volChart(runs);
  catBars(w);
  athlete(data.athlete||{});
  sessions(w);

  $("#foot").textContent="Datum web · runs on data extracted locally by datum_health.py · "+
    (clean.length+" clean runs of "+runs.length);
}

function card(l,v,u,d){
  return `<div class="stat"><div class="l">${l}</div><div class="v">${v}${u?` <small>${u}</small>`:""}</div>${d||""}</div>`;
}

// pace line chart (faster = higher)
function paceChart(clean){
  const svg=$("#paceChart"); const pts=clean.filter(x=>x.pace_s_per_km).map(x=>({d:x.date,p:x.pace_s_per_km}));
  if(pts.length<2){ svg.innerHTML=txt(360,110,"not enough clean runs yet"); return; }
  const W=720,H=220,pad=26;
  const min=Math.min(...pts.map(p=>p.p)), max=Math.max(...pts.map(p=>p.p)), span=(max-min)||1;
  const X=i=>pad+(W-2*pad)*(i/(pts.length-1));
  const Y=p=>pad+(H-2*pad)*((p-min)/span);
  let path="", area="";
  pts.forEach((p,i)=>{ const x=X(i),y=Y(p.p); path+=(i?"L":"M")+x.toFixed(1)+" "+y.toFixed(1)+" "; });
  area=`M${X(0)} ${H-pad} `+pts.map((p,i)=>`L${X(i).toFixed(1)} ${Y(p.p).toFixed(1)}`).join(" ")+` L${X(pts.length-1)} ${H-pad} Z`;
  const dots=pts.map((p,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(p.p).toFixed(1)}" r="3" fill="#3fa686"/>`).join("");
  svg.innerHTML=`
    <defs><linearGradient id="pg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3fa686" stop-opacity="0.28"/><stop offset="1" stop-color="#3fa686" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#pg)"/>
    <path d="${path}" fill="none" stroke="#3fa686" stroke-width="2"/>${dots}
    <text x="${pad}" y="16" fill="#9a9484" font-size="11" font-family="monospace">${fmtPace(min)} fastest</text>
    <text x="${pad}" y="${H-6}" fill="#9a9484" font-size="11" font-family="monospace">${fmtPace(max)} slowest</text>`;
}

// weekly volume bars
function volChart(runs){
  const svg=$("#volChart"); const byWeek={};
  runs.filter(x=>x.valid_for_pace||x.distance_m>=400).forEach(x=>{ const wk=isoWeek(new Date(x.date)); byWeek[wk]=(byWeek[wk]||0)+x.distance_m/1000; });
  const weeks=Object.keys(byWeek).sort().slice(-14); if(!weeks.length){ svg.innerHTML=txt(180,100,"no run distance"); return; }
  const W=360,H=200,pad=24,max=Math.max(...weeks.map(k=>byWeek[k]))||1;
  const bw=(W-2*pad)/weeks.length;
  let bars="";
  weeks.forEach((k,i)=>{ const h=(H-2*pad)*(byWeek[k]/max); const x=pad+i*bw, y=H-pad-h;
    bars+=`<rect x="${(x+bw*0.15).toFixed(1)}" y="${y.toFixed(1)}" width="${(bw*0.7).toFixed(1)}" height="${h.toFixed(1)}" rx="2" fill="#0f6e56"/>`; });
  svg.innerHTML=`${bars}
    <line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="#403c31"/>
    <text x="${pad}" y="14" fill="#9a9484" font-size="10" font-family="monospace">${max.toFixed(0)} km peak</text>`;
}

function catBars(w){
  const cats={};
  w.forEach(x=>{ const c=cats[x.modality]=cats[x.modality]||{n:0,hr:[]}; c.n++; if(x.trusted&&x.hr_avg) c.hr.push(x.hr_avg); });
  const max=Math.max(...Object.values(cats).map(c=>c.n));
  $("#cats").innerHTML=Object.entries(cats).sort((a,b)=>b[1].n-a[1].n).map(([name,c])=>{
    const hr=c.hr.length?Math.round(c.hr.reduce((s,v)=>s+v,0)/c.hr.length):null;
    return `<div class="cat"><div class="name">${name}</div>
      <div class="bar"><i style="width:${(c.n/max*100).toFixed(0)}%"></i></div>
      <div class="fig">${c.n} sessions${hr?` · ${hr} bpm`:""}</div></div>`;
  }).join("");
}

function athlete(a){
  const defs=[["vo2max","VO2 max","ml/kg/min",1],["resting_hr","Resting HR","bpm",-1],["hrv","HRV","ms",1],["body_mass","Body mass","kg",0]];
  $("#athlete").innerHTML=defs.map(([k,label,unit,good])=>{
    const series=(a[k]||[]).map(r=>r[1]); if(!series.length) return card(label,"-",unit);
    const latest=median(series.slice(-5)); // robust to a single bad reading
    const prior=series.slice(-12,-5); const base=prior.length?median(prior):latest;
    const delta=latest-base;
    let d=""; if(prior.length){ const cls=(good===0)?"":((delta*good>=0)?"up":"down");
      d=`<div class="d ${cls}">${delta>=0?"+":""}${delta.toFixed(1)} vs prior</div>`; }
    return card(label,(+latest.toFixed(1)),unit,d);
  }).join("");
}

function sessions(w){
  const rows=[...w].sort((a,b)=>a.date<b.date?1:-1).slice(0,22).map(x=>{
    const dist=x.distance_m>=100?(x.distance_m/1000).toFixed(2):"-";
    return `<tr><td>${x.date}</td><td><span class="tag">${x.modality}</span></td>
      <td class="n">${dist}</td><td class="n">${fmtDur(x.duration_s)}</td>
      <td class="n">${fmtPace(x.pace_s_per_km)}</td><td class="n">${x.hr_avg||"-"}</td>
      <td class="n">${x.energy_kcal||"-"}</td><td>${(x.source||"").replace(/Â|â€™/g,"")}</td></tr>`;
  }).join("");
  $("#sessions tbody").innerHTML=rows;
}

const txt=(x,y,s)=>`<text x="${x}" y="${y}" text-anchor="middle" fill="#6f695b" font-size="13" font-family="monospace">${s}</text>`;
</script>
</body>
</html>
